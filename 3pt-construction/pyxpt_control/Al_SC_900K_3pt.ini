[files]
trajectory        = Al_SC_900K.2pt.lammps
trajectory_format = LAMMPSDUMP
topology          = Al_SC_900K.data.lammps
topology_format   = LAMMPS
[system_properties]
timestep        = 0.001
lammps_units    = real
[thermodynamics]
molecular       = false
hs_eos          = cs
mode = 3PT
refinement = none
cage_entropy = 1
finite_size_correction = off
apodization     = hann
[output]
prefix = Al_SC_900K_3pt
out_units       = kj/mol
normalize       = 1
show_classical_thermo = 1
